<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매 현황 대시보드 · 이지어드민</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* 바 끝에 수량만 검은색으로 표시 */
const inlineBarLabelPlugin = {
  id:'inlineBarLabel',
  afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((bar,ii)=>{
        const v=ds.data[ii];
        if(!v||v===0) return;
        const {x,y,height}=bar.getProps(['x','y','height'],true);
        ctx.save();
        ctx.font=`500 11px 'DM Mono',monospace`;
        ctx.fillStyle='#1a1917';
        ctx.textBaseline='middle';
        ctx.fillText(v, x+6, y+height/2);
        ctx.restore();
      });
    });
  }
};
Chart.register(inlineBarLabelPlugin);
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
    --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
    --text:#1a1917;--text2:#6b6a66;--text3:#a8a7a3;
    --blue:#2563eb;--blue-bg:#eff6ff;--blue-light:#93c5fd;
    --radius:10px;--radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .logo{font-size:15px;font-weight:600;letter-spacing:-.02em}
  .logo span{color:var(--blue)}

  /* 날짜 필터 바 */
  .date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:56px;z-index:99}
  .date-bar label{font-size:12px;color:var(--text2);font-weight:500;white-space:nowrap}
  .date-bar input[type=number]{font-family:'DM Mono',monospace;font-size:13px;width:50px;padding:5px 6px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);text-align:center;outline:none;transition:border-color .15s}
  .date-bar input[type=number]:focus{border-color:var(--blue)}
  .sep{font-size:13px;color:var(--text3)}
  .apply-btn{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border:none;border-radius:7px;background:var(--text);color:#fff;cursor:pointer;transition:background .12s;white-space:nowrap}
  .apply-btn:hover{background:#333}
  .quick-btns{display:flex;gap:5px;flex-wrap:wrap}
  .qbtn{font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
  .qbtn:hover{border-color:var(--blue);color:var(--blue)}
  .range-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);background:var(--blue-bg);border:1px solid #bfdbfe;padding:4px 12px;border-radius:20px;white-space:nowrap;margin-left:auto}

  .main{max-width:1200px;margin:0 auto;padding:24px 24px 60px}

  .tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:24px;width:fit-content}
  .tab{padding:7px 18px;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;border:none;background:transparent;color:var(--text2);border-radius:7px;cursor:pointer;transition:all .15s}
  .tab:hover{background:var(--surface2);color:var(--text)}
  .tab.active{background:var(--text);color:#fff}
  .panel{display:none}.panel.active{display:block}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
  .metric-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .metric-value{font-size:28px;font-weight:600;letter-spacing:-.03em;font-family:'DM Mono',monospace}
  .metric-sub{font-size:11px;color:var(--text3);margin-top:4px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
  .card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .bar-name{font-size:11px;color:var(--text2);width:190px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;height:16px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
  .bar-fill{height:100%;border-radius:4px}
  .bar-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);width:32px;flex-shrink:0;text-align:right}

  .wday-row{display:flex;gap:0;align-items:flex-end}
  .wday-col{flex:1;text-align:center}
  .wday-bwrap{height:80px;display:flex;align-items:flex-end;justify-content:center;padding:0 5px}
  .wday-b{width:100%;border-radius:4px 4px 0 0}
  .wday-nm{font-size:11px;color:var(--text3);margin-top:6px}
  .wday-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:500;margin-top:2px}

  .search-input{width:100%;font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);margin-bottom:10px;outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--blue)}

  .chip-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:28px;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--surface);font-family:'Noto Sans KR',sans-serif;transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--blue-light);color:var(--blue)}
  .chip.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:500}

  .plist{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto}
  .plist::-webkit-scrollbar{width:4px}
  .plist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .pitem{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:all .12s}
  .pitem:hover{border-color:var(--blue-light)}
  .pitem.sel{border-color:var(--blue);background:var(--blue-bg)}
  .pname{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ptotal{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);white-space:nowrap}

  .daily-table-wrap{overflow-x:auto;margin-top:16px;border:1px solid var(--border);border-radius:var(--radius)}
  .daily-table-wrap::-webkit-scrollbar{height:4px}
  .daily-table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  table.dtbl{border-collapse:collapse;font-size:11px;min-width:400px;width:100%}
  table.dtbl th{padding:8px 6px;text-align:center;font-weight:600;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2);letter-spacing:.03em}
  table.dtbl td{padding:5px 6px;text-align:center;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px}
  table.dtbl tr:last-child td{border-bottom:none}
  table.dtbl td.pncell{text-align:left;font-family:'Noto Sans KR',sans-serif;font-size:11px;position:sticky;left:0;background:var(--surface);z-index:1;min-width:150px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:12px;border-right:1px solid var(--border)}
  table.dtbl td.zero{color:var(--text3)}
  table.dtbl td.hi{background:#eff6ff;color:#1d4ed8;font-weight:500}
  table.dtbl td.spike{background:#fff7ed;color:#c2410c;font-weight:600}
  table.dtbl td.total-col{font-weight:600;background:var(--surface2);border-left:1px solid var(--border)}

  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:11px;color:var(--text2)}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;line-height:1.8}

  @media(max-width:768px){
    .metrics{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .bar-name{width:120px}
    header,.date-bar{padding:0 16px}
    .date-bar{padding:10px 16px}
    .main{padding:20px 16px 48px}
    .range-badge{margin-left:0}
  }
</style>
</head>
<body>

<header>
  <div class="logo">판매 대시보드 <span>·</span> 이지어드민</div>
  <div id="range-badge" class="range-badge">2026년 3월</div>
</header>

<!-- 날짜 범위 선택 바 -->
<div class="date-bar">
  <label>시작일</label>
  <input type="date" id="date-from" value="2026-03-01"
    style="font-family:'DM Mono',monospace;font-size:13px;padding:5px 8px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);outline:none">
  <span class="sep">–</span>
  <input type="date" id="date-to" value="2026-03-31"
    style="font-family:'DM Mono',monospace;font-size:13px;padding:5px 8px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);outline:none">
  <button class="apply-btn" onclick="loadData()">불러오기</button>
  <div class="quick-btns">
    <button class="qbtn" onclick="setQuickRange('2026-01-01','2026-01-31')">26년 1월</button>
    <button class="qbtn" onclick="setQuickRange('2026-02-01','2026-02-28')">26년 2월</button>
    <button class="qbtn" onclick="setQuickRange('2026-03-01','2026-03-31')">26년 3월</button>
    <button class="qbtn" onclick="setQuickRange('2026-04-01','2026-04-14')">26년 4월</button>
    <button class="qbtn" onclick="setQuickRange('2026-01-01','2026-04-14')">2026 전체</button>
  </div>
  <div id="loading-badge" style="display:none;font-size:12px;color:var(--text2)">⏳ 로딩 중...</div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview',this)">전체 현황</button>
    <button class="tab" onclick="showTab('products',this)">제품별 분석</button>
    <button class="tab" onclick="showTab('malls',this)">입점몰별 분석</button>
    <button class="tab" onclick="showTab('cross',this)">제품 × 채널</button>

  </div>

  <!-- OVERVIEW -->
  <div id="panel-overview" class="panel active">
    <div class="metrics">
      <div class="metric"><div class="metric-label">기간 판매량</div><div class="metric-value" id="m-total">3,570</div><div class="metric-sub" id="m-days">31일 기준</div></div>
      <div class="metric"><div class="metric-label">일평균 판매량</div><div class="metric-value" id="m-avg">115</div><div class="metric-sub">일평균</div></div>
      <div class="metric"><div class="metric-label">최고 판매일</div><div class="metric-value" id="m-peak">3/9</div><div class="metric-sub" id="m-peak-val">239개</div></div>
      <div class="metric"><div class="metric-label">입점 채널</div><div class="metric-value" id="m-mall-count">–</div><div class="metric-sub">판매처 기준</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title" id="top20-title">TOP 20 제품 · 전체 기간</div>
        <div id="top20-bars"></div>
      </div>
      <div class="card">
        <div class="card-title">요일별 평균 판매량</div>
        <div class="wday-row" id="wday-chart"></div>
        <div id="wday-note" style="margin-top:14px;font-size:12px;color:var(--text2);line-height:1.8"></div>
      </div>
    </div>
  </div>
    <div class="card" style="margin-top:16px">
      <div class="card-title" id="trend-title">일별 판매량 추이</div>
      <div style="position:relative;height:240px"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div id="panel-products" class="panel">
    <div class="grid2" style="margin-bottom:20px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">제품 선택</div>
        <div class="chip-bar" id="sel-chips"><span style="font-size:12px;color:var(--text3)">아래 목록에서 선택하세요</span></div>
        <input class="search-input" type="text" placeholder="제품명 검색..." oninput="filterP(this.value)">
        <div class="plist" id="plist"></div>
      </div>
      <div id="pchart-wrap"><div class="empty">제품을 선택하면<br>일별 추이가 표시됩니다</div></div>
    </div>
    <div id="ptable-area"></div>
  </div>

  <!-- MALLS -->
  <div id="panel-malls" class="panel">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">채널 선택 (복수 가능)</div>
    <div class="chip-bar" id="mall-chips"></div>
    <div class="card" id="mall-chart-area"><div class="empty">채널을 선택하세요</div></div>
  </div>

  <!-- CROSS: 제품 × 채널 -->
  <div id="panel-cross" class="panel">
    <div class="grid2" style="margin-bottom:20px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">제품 선택 (복수 가능)</div>
        <div class="chip-bar" id="cx-prod-chips"><span style="font-size:12px;color:var(--text3)">아래 목록에서 선택하세요</span></div>
        <input class="search-input" id="cx-search" type="text" placeholder="제품명 검색..." oninput="cxFilterP(this.value)">
        <div class="plist" id="cx-plist"></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">채널 선택 (복수 가능)</div>
        <div class="chip-bar" id="cx-mall-chips"></div>
        <!-- 그룹 설정 -->
        <div id="cx-group-section" style="display:none;margin-top:20px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">
            그룹 설정 <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text3)">· 제품 옆 A–E 버튼으로 배정</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
            <button onclick="cxClearGroups()" style="font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:4px 12px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer">초기화</button>
          </div>
          <div id="cx-groups-wrap"></div>
        </div>
      </div>
    </div>
    <div id="cx-result"></div>
  </div>

</div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbwQW2eVJ31I57JhrYEsQ0A-5nxHfSRcTG6agbfMwRxP8rMatwSchKSOG5u00cg2qE2d/exec';

/* ── 상태 ── */
let currentYM = '2026-03';
let RAW = [];          // [{date,prod,mall,qty}]
let selP=[], selM=['스마트스토어'], tChart=null, pChart=null, mallsInited=false;
let cxSelP=[], cxSelM=[], cxChart=null, cxInited=false;
const GRP_KEYS=['A','B','C','D','E'];
const GRP_CLRS={A:'#2563eb',B:'#16a34a',C:'#c2410c',D:'#9333ea',E:'#ca8a04'};
let cxGroups={A:[],B:[],C:[],D:[],E:[]};

/* ── 파생 데이터 (RAW에서 계산) ── */
let DATES=[];          // ["01","02",...] 해당 월의 날짜들
let PROD_DAILY={};     // {상품명: [d1,d2,...]}
let MALL_DAILY={};     // {상품명: {판매처: [d1,d2,...]}}
let MALL_MAP={};       // {판매처: {상품명: total}}
let CROSS_DATA={};     // {판매처: {상품명: total}}
let DAILY_ALL=[];      // [d1,d2,...] 전체 일별 합계

/* ── 데이터 로딩 ── */
/* ── 날짜 범위 선택 ── */
function setQuickRange(from, to){
  document.getElementById('date-from').value = from;
  document.getElementById('date-to').value = to;
  loadData();
}

async function loadData(){
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;

  if(!from || !to){ alert('날짜를 선택해주세요'); return; }
  if(from > to){ alert('시작일이 종료일보다 늦을 수 없어요'); return; }

  document.getElementById('loading-badge').style.display='inline';
  document.getElementById('range-badge').textContent = `${from} – ${to} 로딩 중...`;

  try {
    const url = API_URL + '?from=' + from + '&to=' + to;
    const res = await fetch(url);
    const json = await res.json();

    if(json.error) throw new Error(json.error);

    RAW = json.rows.map(r=>({
      date: r[0],
      prod: r[1],
      mall: r[2],
      qty:  +r[3]
    }));

    buildDerived();
    resetSelections();
    refreshAll();

    document.getElementById('range-badge').textContent = `${from} – ${to} · ${RAW.length.toLocaleString()}건`;
    document.getElementById('loading-badge').style.display='none';

  } catch(err) {
    document.getElementById('loading-badge').style.display='none';
    document.getElementById('range-badge').textContent = '오류 발생';
    alert('데이터 로딩 실패: ' + err.message);
  }


function buildDerived(){
  /* 해당 월의 날짜 목록 */
  const daySet = new Set(RAW.map(r=>r.date.slice(8,10)));
  DATES = [...daySet].sort();

  const dayIdx = Object.fromEntries(DATES.map((d,i)=>[d,i]));
  const n = DATES.length;

  PROD_DAILY={};
  MALL_DAILY={};
  MALL_MAP={};
  DAILY_ALL = Array(n).fill(0);

  RAW.forEach(({date,prod,mall,qty})=>{
    const di = dayIdx[date.slice(8,10)];
    if(di===undefined) return;

    /* PROD_DAILY */
    if(!PROD_DAILY[prod]) PROD_DAILY[prod]=Array(n).fill(0);
    PROD_DAILY[prod][di]+=qty;

    /* MALL_DAILY */
    if(!MALL_DAILY[prod]) MALL_DAILY[prod]={};
    if(!MALL_DAILY[prod][mall]) MALL_DAILY[prod][mall]=Array(n).fill(0);
    MALL_DAILY[prod][mall][di]+=qty;

    /* MALL_MAP */
    if(!MALL_MAP[mall]) MALL_MAP[mall]={};
    MALL_MAP[mall][prod]=(MALL_MAP[mall][prod]||0)+qty;

    /* DAILY_ALL */
    DAILY_ALL[di]+=qty;
  });

  /* CROSS_DATA = MALL_MAP 복사 */
  CROSS_DATA = JSON.parse(JSON.stringify(MALL_MAP));
}

function resetSelections(){
  selP=[]; selM=[]; tChart=null; pChart=null;
  mallsInited=false;
  cxSelP=[]; cxSelM=[]; cxChart=null; cxInited=false;
  GRP_KEYS.forEach(k=>cxGroups[k]=[]);
  document.getElementById('mall-chips').innerHTML='';
  document.getElementById('cx-mall-chips').innerHTML='';
}

/* ── OVERVIEW ── */
function renderOverview(){
  if(!DAILY_ALL.length) return;

  const total=DAILY_ALL.reduce((a,b)=>a+b,0);
  const days=DATES.length;
  const avg=Math.round(total/days);
  const peakIdx=DAILY_ALL.indexOf(Math.max(...DAILY_ALL));
  const peakDay=DATES[peakIdx];
  const [y,mo] = currentYM.split('-');

  document.getElementById('m-total').textContent=total.toLocaleString();
  document.getElementById('m-days').textContent=`${days}일 기준`;
  document.getElementById('m-avg').textContent=avg.toLocaleString();
  document.getElementById('m-peak').textContent=`${parseInt(mo)}/${parseInt(peakDay)}`;
  document.getElementById('m-peak-val').textContent=`${DAILY_ALL[peakIdx]}개`;
  document.getElementById('top20-title').textContent=`TOP 20 제품 · ${y}년 ${parseInt(mo)}월`;

  /* 입점 채널 수 */
  const mallCount = Object.keys(MALL_MAP).length;
  document.getElementById('m-mall-count').textContent=mallCount;

  /* TOP 20 바 차트 */
  const ranked = Object.entries(PROD_DAILY)
    .map(([n,arr])=>([n,arr.reduce((a,b)=>a+b,0)]))
    .sort((a,b)=>b[1]-a[1]).slice(0,20);
  const t20max=Math.max(...ranked.map(r=>r[1]),1);
  const t20el=document.getElementById('top20-bars'); t20el.innerHTML='';
  ranked.forEach(([n,v])=>{
    const pct=Math.round(v/t20max*100);
    t20el.innerHTML+=`<div class="bar-row"><div class="bar-name" title="${n}">${n}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#2563eb"></div></div><div class="bar-val">${v}</div></div>`;
  });

  /* 요일별 */
  const wdayMap={0:'일',1:'월',2:'화',3:'수',4:'목',5:'금',6:'토'};
  const ws={월:[],화:[],수:[],목:[],금:[],토:[],일:[]};
  DATES.forEach((d,i)=>{
    const dt=new Date(currentYM.slice(0,4),parseInt(currentYM.slice(5,7))-1,parseInt(d));
    ws[wdayMap[dt.getDay()]].push(DAILY_ALL[i]);
  });
  const order=['월','화','수','목','금','토','일'];
  const wa={};
  order.forEach(wd=>{ wa[wd]=ws[wd].length?Math.round(ws[wd].reduce((a,b)=>a+b,0)/ws[wd].length):0; });
  const wmax=Math.max(...Object.values(wa),1);
  const wel=document.getElementById('wday-chart'); wel.innerHTML='';
  order.forEach(wd=>{
    const v=wa[wd],h=Math.round(v/wmax*72),isMax=v===Math.max(...Object.values(wa));
    wel.innerHTML+=`<div class="wday-col"><div class="wday-bwrap"><div class="wday-b" style="height:${h}px;background:${isMax?'#1d4ed8':'#93c5fd'}"></div></div><div class="wday-nm">${wd}</div><div class="wday-v" style="color:${isMax?'#1d4ed8':'var(--text2)'}">${v}</div></div>`;
  });
  const maxWd=order.reduce((a,b)=>wa[a]>=wa[b]?a:b);
  const minWd=order.reduce((a,b)=>wa[a]<=wa[b]?a:b);
  document.getElementById('wday-note').innerHTML=`${maxWd}요일 <strong style="color:var(--text)">${wa[maxWd]}개</strong> 최고 · ${minWd}요일 <strong style="color:var(--text)">${wa[minWd]}개</strong> 최저`;
}

  <div class="daily-table-wrap" id="ptable-scroll">
  <table class="dtbl" id="ptable" style="user-select:none">

    <th style="position:sticky;left:0;background:var(--surface2);z-index:2">상품명</th>
    ${labels.map((d,i)=>`<th data-di="${i}">${d}</th>`).join('')}
    <th>합계</th>
  </tr></thead><tbody>`;

  selP.forEach((p,pi)=>{

  });
  html+=`<td class="total-col" style="font-weight:700">${grandTotal}</td></tr>`;
  html+=`</tbody></table></div>`;
  ta.innerHTML=html;

  /* 드래그 합산 */
  let dragStart=null,dragEnd=null,isDragging=false;
  const tbl=document.getElementById('ptable');

  tbl.addEventListener('mouseover',e=>{
    if(!isDragging)return;
    const td=e.target.closest('.dtcell'); if(!td)return;

    const minDi=Math.min(dragStart.di,dragEnd.di),maxDi=Math.max(dragStart.di,dragEnd.di);

      ttip.innerHTML=`<b style="color:#fff">${dayLabel} · ${prod.length>16?prod.slice(0,16)+'…':prod}: ${v}개</b><br>${lines.length?lines.join('<br>'):'채널 데이터 없음'}`;

    const col=GRP_CLRS[k],prods=cxGroups[k].filter(p=>cxSelP.includes(p));
    const vals=cxSelM.map(m=>prods.reduce((s,p)=>s+((CROSS_DATA[m]&&CROSS_DATA[m][p])||0),0));
    const total=vals.reduce((a,b)=>a+b,0);
    let row=`<tr style="background:${col}10"><td style="padding:6px 8px 6px 12px;font-size:11px;font-weight:700;color:${col};white-space:nowrap;position:sticky;left:0;background:${col}10;border-top:1.5px solid ${col}50;border-bottom:1.5px solid ${col}50">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:${col};color:#fff;font-size:10px;font-weight:700;margin-right:6px">${k}</span>그룹 ${k} 소계</td>`;
    vals.forEach(v=>{row+=`<td style="font-weight:700;font-family:'DM Mono',monospace;font-size:12px;color:${col};border-top:1.5px solid ${col}50;border-bottom:1.5px solid ${col}50">${v||'·'}</td>`;});
    return row+`<td style="font-weight:700;font-family:'DM Mono',monospace;font-size:13px;color:${col};background:${col}20;border-top:1.5px solid ${col}50;border-bottom:1.5px solid ${col}50">${total}</td></tr>`;
  }
  activeGrps.forEach(k=>{cxGroups[k].filter(p=>cxSelP.includes(p)).forEach(p=>{tbl+=prodRowTbl(p);});tbl+=subtotalRowTbl(k);});
  ungrouped.forEach(p=>{tbl+=prodRowTbl(p,'color:var(--text2)');});
  tbl+=`</tbody></table></div></div>`;

  let chart=`<div class="card"><div class="card-title">제품 × 채널 판매량 차트</div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">
    <colgroup><col style="width:260px"><col style="width:120px"><col style="width:auto"></colgroup>
    <thead><tr>
      <th style="text-align:left;padding:6px 8px;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)">제품명</th>
      <th style="text-align:left;padding:6px 8px;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)">채널</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border)"></th>
    </tr></thead><tbody>`;
  orderedProds.forEach((p,pi)=>{
    const grpKey=cxGetGroup(p),prodCol=grpKey?GRP_CLRS[grpKey]:null;
    cxSelM.forEach((mall,mi)=>{
      const v=(CROSS_DATA[mall]&&CROSS_DATA[mall][p])||0,pct=Math.round(v/maxV*100);
      const isFirst=mi===0,isLast=mi===cxSelM.length-1,isLastProd=pi===orderedProds.length-1;
      const sep=isLast&&!isLastProd?'border-bottom:2px solid var(--border2)':'border-bottom:1px solid var(--border)';
      const nameStyle=prodCol?`color:${prodCol};font-weight:600`:'color:var(--text);font-weight:500';
      const prodCell=isFirst?`<td style="padding:6px 8px;vertical-align:middle;${sep};${nameStyle};font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px" rowspan="${cxSelM.length}" title="${p}">
        ${prodCol?`<span style="display:inline-block;width:8px;height:8px;border-radius:3px;background:${prodCol};margin-right:5px;vertical-align:middle"></span>`:''}${p}</td>`:'';
      chart+=`<tr>${prodCell}
        <td style="padding:5px 8px;${sep};color:var(--text2);font-size:11px;white-space:nowrap"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${mallClrs[mi%12]};margin-right:5px;vertical-align:middle"></span>${mall}</td>
        <td style="padding:5px 8px;${sep}"><div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:18px;background:var(--surface2);border-radius:3px;position:relative"><div style="width:${pct}%;height:100%;background:${mallClrs[mi%12]};border-radius:3px;min-width:${v>0?2:0}px"></div></div>
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:${v>0?'var(--text)':'var(--text3)'};min-width:28px;text-align:right">${v||'·'}</span>
        </div></td></tr>`;
    });
    if(grpKey){
      const grpProds=cxGroups[grpKey].filter(q=>cxSelP.includes(q));
      if(p===grpProds[grpProds.length-1]){
        const col=GRP_CLRS[grpKey],subs=cxSelM.map(m=>grpProds.reduce((s,q)=>s+((CROSS_DATA[m]&&CROSS_DATA[m][q])||0),0)),gT=subs.reduce((a,b)=>a+b,0);
        chart+=`<tr style="background:${col}0d">
          <td colspan="2" style="padding:5px 8px;font-size:11px;font-weight:700;color:${col};border-bottom:2px solid ${col}50;border-top:1px solid ${col}30">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:${col};color:#fff;font-size:9px;font-weight:700;margin-right:6px">${grpKey}</span>그룹 ${grpKey} 소계</td>
          <td style="padding:5px 8px;border-bottom:2px solid ${col}50;border-top:1px solid ${col}30">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:18px;background:${col}25;border-radius:3px;position:relative"><div style="width:${Math.round(gT/maxV*100)}%;height:100%;background:${col};border-radius:3px;opacity:0.6"></div></div>
              <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${col};min-width:28px;text-align:right">${gT}</span>
            </div></td></tr>`;
      }
    }
  });
  chart+=`</tbody></table></div></div>`;
  area.innerHTML=tbl+chart;
  if(cxChart){cxChart.destroy();cxChart=null;}
}

/* ── TAB ── */
function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='overview') renderTrend();
  if(id==='malls') initMalls();
  if(id==='cross') initCross();
}

function refreshAll(){
  renderOverview();
  renderTrend();
  if(selP.length>0) renderPCharts();
  renderPlist(document.querySelector('.search-input')?.value||'');
  if(mallsInited) renderMallChart();
}

/* ── 초기 로딩 ── */
loadData();

</script>
</body>
</html>
