<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매 현황 대시보드 · 2026년 3월</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* 바 끝에 수량만 검은색으로 표시 */
const inlineBarLabelPlugin = {
  id:'inlineBarLabel',
  afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((bar,ii)=>{
        const v=ds.data[ii];
        if(!v||v===0) return;
        const {x,y,height}=bar.getProps(['x','y','height'],true);
        ctx.save();
        ctx.font=`500 11px 'DM Mono',monospace`;
        ctx.fillStyle='#1a1917';
        ctx.textBaseline='middle';
        ctx.fillText(v, x+6, y+height/2);
        ctx.restore();
      });
    });
  }
};
Chart.register(inlineBarLabelPlugin);
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
    --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
    --text:#1a1917;--text2:#6b6a66;--text3:#a8a7a3;
    --blue:#2563eb;--blue-bg:#eff6ff;--blue-light:#93c5fd;
    --radius:10px;--radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .logo{font-size:15px;font-weight:600;letter-spacing:-.02em}
  .logo span{color:var(--blue)}

  /* 날짜 필터 바 */
  .date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:56px;z-index:99}
  .date-bar label{font-size:12px;color:var(--text2);font-weight:500;white-space:nowrap}
  .date-bar input[type=number]{font-family:'DM Mono',monospace;font-size:13px;width:50px;padding:5px 6px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);text-align:center;outline:none;transition:border-color .15s}
  .date-bar input[type=number]:focus{border-color:var(--blue)}
  .sep{font-size:13px;color:var(--text3)}
  .apply-btn{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border:none;border-radius:7px;background:var(--text);color:#fff;cursor:pointer;transition:background .12s;white-space:nowrap}
  .apply-btn:hover{background:#333}
  .quick-btns{display:flex;gap:5px;flex-wrap:wrap}
  .qbtn{font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
  .qbtn:hover{border-color:var(--blue);color:var(--blue)}
  .range-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);background:var(--blue-bg);border:1px solid #bfdbfe;padding:4px 12px;border-radius:20px;white-space:nowrap;margin-left:auto}

  .main{max-width:1200px;margin:0 auto;padding:24px 24px 60px}

  .tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:24px;width:fit-content}
  .tab{padding:7px 18px;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;border:none;background:transparent;color:var(--text2);border-radius:7px;cursor:pointer;transition:all .15s}
  .tab:hover{background:var(--surface2);color:var(--text)}
  .tab.active{background:var(--text);color:#fff}
  .panel{display:none}.panel.active{display:block}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
  .metric-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .metric-value{font-size:28px;font-weight:600;letter-spacing:-.03em;font-family:'DM Mono',monospace}
  .metric-sub{font-size:11px;color:var(--text3);margin-top:4px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
  .card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .bar-name{font-size:11px;color:var(--text2);width:190px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;height:16px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
  .bar-fill{height:100%;border-radius:4px}
  .bar-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);width:32px;flex-shrink:0;text-align:right}

  .wday-row{display:flex;gap:0;align-items:flex-end}
  .wday-col{flex:1;text-align:center}
  .wday-bwrap{height:80px;display:flex;align-items:flex-end;justify-content:center;padding:0 5px}
  .wday-b{width:100%;border-radius:4px 4px 0 0}
  .wday-nm{font-size:11px;color:var(--text3);margin-top:6px}
  .wday-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:500;margin-top:2px}

  .search-input{width:100%;font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);margin-bottom:10px;outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--blue)}

  .chip-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:28px;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--surface);font-family:'Noto Sans KR',sans-serif;transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--blue-light);color:var(--blue)}
  .chip.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:500}

  .plist{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto}
  .plist::-webkit-scrollbar{width:4px}
  .plist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .pitem{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:all .12s}
  .pitem:hover{border-color:var(--blue-light)}
  .pitem.sel{border-color:var(--blue);background:var(--blue-bg)}
  .pname{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ptotal{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);white-space:nowrap}

  .daily-table-wrap{overflow-x:auto;margin-top:16px;border:1px solid var(--border);border-radius:var(--radius)}
  .daily-table-wrap::-webkit-scrollbar{height:4px}
  .daily-table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  table.dtbl{border-collapse:collapse;font-size:11px;min-width:400px;width:100%}
  table.dtbl th{padding:8px 6px;text-align:center;font-weight:600;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2);letter-spacing:.03em}
  table.dtbl td{padding:5px 6px;text-align:center;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px}
  table.dtbl tr:last-child td{border-bottom:none}
  table.dtbl td.pncell{text-align:left;font-family:'Noto Sans KR',sans-serif;font-size:11px;position:sticky;left:0;background:var(--surface);z-index:1;min-width:150px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:12px;border-right:1px solid var(--border)}
  table.dtbl td.zero{color:var(--text3)}
  table.dtbl td.hi{background:#eff6ff;color:#1d4ed8;font-weight:500}
  table.dtbl td.spike{background:#fff7ed;color:#c2410c;font-weight:600}
  table.dtbl td.total-col{font-weight:600;background:var(--surface2);border-left:1px solid var(--border)}

  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:11px;color:var(--text2)}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;line-height:1.8}

  @media(max-width:768px){
    .metrics{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .bar-name{width:120px}
    header,.date-bar{padding:0 16px}
    .date-bar{padding:10px 16px}
    .main{padding:20px 16px 48px}
    .range-badge{margin-left:0}
  }
</style>
</head>
<body>

<header>
  <div class="logo">판매 대시보드 <span>·</span> 이지어드민</div>
  <div id="range-badge" class="range-badge">3/1 – 3/31 · 전체</div>
</header>

<!-- 날짜 필터 바 (전 탭 공통) -->
<div class="date-bar">
  <label>3월</label>
  <input type="number" id="d-from" min="1" max="31" value="1">
  <span class="sep">–</span>
  <input type="number" id="d-to" min="1" max="31" value="31">
  <span class="sep">일</span>
  <button class="apply-btn" onclick="applyRange()">적용</button>
  <div class="quick-btns">
    <button class="qbtn" onclick="setRange(1,7)">1주차</button>
    <button class="qbtn" onclick="setRange(8,14)">2주차</button>
    <button class="qbtn" onclick="setRange(15,21)">3주차</button>
    <button class="qbtn" onclick="setRange(22,31)">4주차</button>
    <button class="qbtn" onclick="setRange(1,31)">전체</button>
  </div>
  <div id="range-badge2" class="range-badge" style="display:none"></div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview',this)">전체 현황</button>
    <button class="tab" onclick="showTab('products',this)">제품별 분석</button>
    <button class="tab" onclick="showTab('malls',this)">입점몰별 분석</button>
    <button class="tab" onclick="showTab('cross',this)">제품 × 채널</button>

  </div>

  <!-- OVERVIEW -->
  <div id="panel-overview" class="panel active">
    <div class="metrics">
      <div class="metric"><div class="metric-label">기간 판매량</div><div class="metric-value" id="m-total">3,570</div><div class="metric-sub" id="m-days">31일 기준</div></div>
      <div class="metric"><div class="metric-label">일평균 판매량</div><div class="metric-value" id="m-avg">115</div><div class="metric-sub">일평균</div></div>
      <div class="metric"><div class="metric-label">최고 판매일</div><div class="metric-value" id="m-peak">3/9</div><div class="metric-sub" id="m-peak-val">239개</div></div>
      <div class="metric"><div class="metric-label">입점 채널</div><div class="metric-value">12</div><div class="metric-sub">판매처 기준</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title" id="top20-title">TOP 20 제품 · 전체 기간</div>
        <div id="top20-bars"></div>
      </div>
      <div class="card">
        <div class="card-title">요일별 평균 판매량</div>
        <div class="wday-row" id="wday-chart"></div>
        <div id="wday-note" style="margin-top:14px;font-size:12px;color:var(--text2);line-height:1.8"></div>
      </div>
    </div>
  </div>
    <div class="card" style="margin-top:16px">
      <div class="card-title" id="trend-title">일별 판매량 추이</div>
      <div style="position:relative;height:240px"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div id="panel-products" class="panel">
    <div class="grid2" style="margin-bottom:20px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">제품 선택</div>
        <div class="chip-bar" id="sel-chips"><span style="font-size:12px;color:var(--text3)">아래 목록에서 선택하세요</span></div>
        <input class="search-input" type="text" placeholder="제품명 검색..." oninput="filterP(this.value)">
        <div class="plist" id="plist"></div>
      </div>
      <div id="pchart-wrap"><div class="empty">제품을 선택하면<br>일별 추이가 표시됩니다</div></div>
    </div>
    <div id="ptable-area"></div>
  </div>

  <!-- MALLS -->
  <div id="panel-malls" class="panel">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">채널 선택 (복수 가능)</div>
    <div class="chip-bar" id="mall-chips"></div>
    <div class="card" id="mall-chart-area"><div class="empty">채널을 선택하세요</div></div>
  </div>

  <!-- CROSS: 제품 × 채널 -->
  <div id="panel-cross" class="panel">
    <div class="grid2" style="margin-bottom:20px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">제품 선택 (복수 가능)</div>
        <div class="chip-bar" id="cx-prod-chips"><span style="font-size:12px;color:var(--text3)">아래 목록에서 선택하세요</span></div>
        <input class="search-input" id="cx-search" type="text" placeholder="제품명 검색..." oninput="cxFilterP(this.value)">
        <div class="plist" id="cx-plist"></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">채널 선택 (복수 가능)</div>
        <div class="chip-bar" id="cx-mall-chips"></div>
        <!-- 그룹 설정 -->
        <div id="cx-group-section" style="display:none;margin-top:20px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">
            그룹 설정 <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text3)">· 제품 옆 A–E 버튼으로 배정</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
            <button onclick="cxClearGroups()" style="font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:4px 12px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer">초기화</button>
          </div>
          <div id="cx-groups-wrap"></div>
        </div>
      </div>
    </div>
    <div id="cx-result"></div>
  </div>

/* ── 날짜 범위 ── */
function setRange(f,t){
  document.getElementById('d-from').value=f;
  document.getElementById('d-to').value=t;
  applyRange();
}
function applyRange(){
  let f=parseInt(document.getElementById('d-from').value)||1;
  let t=parseInt(document.getElementById('d-to').value)||31;
  f=Math.max(1,Math.min(31,f)); t=Math.max(f,Math.min(31,t));
  document.getElementById('d-from').value=f;
  document.getElementById('d-to').value=t;
  rangeFrom=f; rangeTo=t;
  const lbl=f===1&&t===31?'3/1 – 3/31 · 전체':`3/${f} – 3/${t}`;
  document.getElementById('range-badge').textContent=lbl;
  refreshAll();
}

  const peakDay=rangeFrom+peakIdx;

  const wa={};
  const order=['월','화','수','목','금','토','일'];
  order.forEach(wd=>{ wa[wd]=ws[wd].length?Math.round(ws[wd].reduce((a,b)=>a+b,0)/ws[wd].length):0; });
  const wmax=Math.max(...Object.values(wa),1);
  const wel=document.getElementById('wday-chart'); wel.innerHTML='';
  order.forEach(wd=>{
    const v=wa[wd],h=Math.round(v/wmax*72),isMax=v===Math.max(...Object.values(wa));
    wel.innerHTML+=`<div class="wday-col"><div class="wday-bwrap"><div class="wday-b" style="height:${h}px;background:${isMax?'#1d4ed8':'#93c5fd'}"></div></div><div class="wday-nm">${wd}</div><div class="wday-v" style="color:${isMax?'#1d4ed8':'var(--text2)'}">${v}</div></div>`;
  });
  const maxWd=order.reduce((a,b)=>wa[a]>=wa[b]?a:b);
  const minWd=order.reduce((a,b)=>wa[a]<=wa[b]?a:b);
  document.getElementById('wday-note').innerHTML=`${maxWd}요일 <strong style="color:var(--text)">${wa[maxWd]}개</strong> 최고 · ${minWd}요일 <strong style="color:var(--text)">${wa[minWd]}개</strong> 최저`;
}

}
function renderPCharts(){
  const cw=document.getElementById('pchart-wrap'),ta=document.getElementById('ptable-area');
  if(selP.length===0){cw.innerHTML='<div class="empty">제품을 선택하면<br>일별 추이가 표시됩니다</div>';ta.innerHTML='';if(pChart){pChart.destroy();pChart=null;}return;}
  const days=rangeTo-rangeFrom+1;
  const labels=Array.from({length:days},(_,i)=>`${rangeFrom+i}`);
  const clrs=['#2563eb','#16a34a','#c2410c','#9333ea','#ca8a04','#0891b2'];
  const dsets=selP.map((p,i)=>({
    label:p,data:slice(PROD_DAILY_ALL[p]||[]),
    borderColor:clrs[i%6],backgroundColor:clrs[i%6]+'20',
    fill:false,tension:0.3,pointRadius:2,borderWidth:2,pointHoverRadius:4
  }));
  cw.innerHTML=`<div style="position:relative;height:240px"><canvas id="pChart"></canvas></div><div class="legend">`+
    selP.map((p,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${clrs[i%6]}"></span>${p.length>16?p.slice(0,16)+'…':p}</span>`).join('')+'</div>';
  if(pChart)pChart.destroy();
  pChart=new Chart(document.getElementById('pChart'),{type:'line',
    data:{labels,datasets:dsets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>`3월 ${i[0].label}일`}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:0},grid:{display:false}},y:{min:0,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}}}}
  });
  const allV=selP.flatMap(p=>slice(PROD_DAILY_ALL[p]||[]));
  const gmax=Math.max(...allV,1);

  /* 날짜 인덱스별 채널 합계 (툴팁용: CROSS_DATA 기반) */
  function getMallBreakdown(p, dayIdx){
    /* dayIdx = 0-based within slice */
    const absIdx = rangeFrom - 1 + dayIdx;
    const malls = Object.keys(CROSS_DATA);
    return malls.map(m=>{
      const arr = CROSS_DATA[m] && CROSS_DATA[m][p];
      const v = arr ? (PROD_DAILY_ALL[p]||[])[absIdx]||0 : 0;
      /* CROSS_DATA only has totals; use proportional estimate */
      const total31 = Object.values(PROD_DAILY_ALL[p]||[]).reduce((a,b)=>a+b,0)||1;
      const mallTotal = CROSS_DATA[m]?.[p]||0;
      return null; /* skip - use MALL_DAILY_ALL if available */
    });
  }

  /* 소계 행 데이터 */
  const subtotals = labels.map((_,i)=> selP.reduce((s,p)=>{
    const pd=slice(PROD_DAILY_ALL[p]||[]);
    return s+(pd[i]||0);
  },0));
  const grandTotal = subtotals.reduce((a,b)=>a+b,0);

  let tableHtml=`
  <div id="ptable-header" style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 8px">
    <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em">일별 수량 상세 (3/${rangeFrom}–3/${rangeTo})</span>
    <span id="drag-sum-badge" style="display:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-bg);border:1px solid #bfdbfe;padding:3px 12px;border-radius:20px"></span>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:8px">셀을 드래그하면 범위 합산 · 셀에 커서를 올리면 채널별 수량 표시</div>
  <div class="daily-table-wrap" id="ptable-scroll">
  <table class="dtbl" id="ptable" style="user-select:none">
  <thead><tr>
    <th style="position:sticky;left:0;background:var(--surface2);z-index:2">상품명</th>
    ${labels.map((d,i)=>`<th data-di="${i}">${d}</th>`).join('')}
    <th>합계</th>
  </tr></thead><tbody>`;

  selP.forEach((p,pi)=>{
    const pd=slice(PROD_DAILY_ALL[p]||[]);
    const pt=pd.reduce((a,b)=>a+b,0);
    const clr=['#2563eb','#16a34a','#c2410c','#9333ea','#ca8a04','#0891b2'][pi%6];
    tableHtml+=`<tr data-prod="${p}">
      <td class="pncell" style="border-left:3px solid ${clr}" title="${p}">${p}</td>`;
    pd.forEach((v,di)=>{
      const cls=v===0?'zero':v>=gmax*.65?'spike':v>=gmax*.3?'hi':'';
      tableHtml+=`<td class="${cls} dtcell" data-v="${v}" data-di="${di}" data-prod="${p}">${v||'·'}</td>`;
    });
    tableHtml+=`<td class="total-col">${pt}</td></tr>`;
  });

  /* 소계 행 */
  tableHtml+=`<tr data-prod="__subtotal__" style="background:var(--surface2)">
    <td class="pncell" style="font-weight:600;color:var(--text);border-left:3px solid var(--text3)">소계</td>`;
  subtotals.forEach((v,di)=>{
    const cls=v===0?'zero':'';
    tableHtml+=`<td class="${cls} dtcell" data-v="${v}" data-di="${di}" data-prod="__subtotal__" style="font-weight:500">${v||'·'}</td>`;
  });
  tableHtml+=`<td class="total-col" style="font-weight:700">${grandTotal}</td></tr>`;

  tableHtml+=`</tbody></table></div>`;
  ta.innerHTML=tableHtml;

  /* ── 드래그 합산 로직 ── */
  let dragStart=null, dragEnd=null, isDragging=false;
  const tbl=document.getElementById('ptable');
  const badge=document.getElementById('drag-sum-badge');

  function getCellKey(td){ return {di:+td.dataset.di, prod:td.dataset.prod}; }
  function computeDragSum(){
    if(dragStart===null||dragEnd===null) return null;
    const minDi=Math.min(dragStart.di,dragEnd.di);
    const maxDi=Math.max(dragStart.di,dragEnd.di);
    let sum=0;
    tbl.querySelectorAll('.dtcell').forEach(td=>{
      const di=+td.dataset.di;
      if(di>=minDi&&di<=maxDi) sum+=+td.dataset.v||0;
    });
    return {sum, minDi, maxDi};
  }
  function highlightDrag(){
    const minDi=dragStart?Math.min(dragStart.di,dragEnd?.di??dragStart.di):null;
    const maxDi=dragStart?Math.max(dragStart.di,dragEnd?.di??dragStart.di):null;
    tbl.querySelectorAll('.dtcell').forEach(td=>{
      const di=+td.dataset.di;
      td.style.background=(minDi!==null&&di>=minDi&&di<=maxDi)?'#dbeafe':'';
    });
  }
  function showBadge(sum,minDi,maxDi){
    badge.style.display='inline-block';
    badge.textContent=`3/${rangeFrom+minDi}–3/${rangeFrom+maxDi} 합산: ${sum}개`;
  }
  function clearDrag(){
    dragStart=null; dragEnd=null; isDragging=false;
    tbl.querySelectorAll('.dtcell').forEach(td=>td.style.background='');
    badge.style.display='none';
  }

  tbl.addEventListener('mousedown',e=>{
    const td=e.target.closest('.dtcell');
    if(!td) return;
    isDragging=true;
    dragStart=getCellKey(td); dragEnd=getCellKey(td);
    highlightDrag();
    e.preventDefault();
  });
  tbl.addEventListener('mouseover',e=>{
    if(!isDragging) return;
    const td=e.target.closest('.dtcell');
    if(!td) return;
    dragEnd=getCellKey(td);
    highlightDrag();
    const r=computeDragSum();
    if(r) showBadge(r.sum,r.minDi,r.maxDi);
  });
  document.addEventListener('mouseup',()=>{ isDragging=false; });
  tbl.addEventListener('mouseleave',()=>{ if(!isDragging) return; });
  /* 테이블 밖 클릭 시 해제 */
  document.getElementById('ptable-scroll').addEventListener('mouseleave',()=>{
    if(!isDragging){ clearDrag(); }
  });

  /* ── 셀 호버 툴팁 (채널별 수량) ── */
  /* CROSS_DATA는 월합계만 있으므로 비율로 추정 */
  let ttip=document.getElementById('ptip');
  if(!ttip){ ttip=document.createElement('div'); ttip.id='ptip';
    ttip.style.cssText='position:fixed;background:#1a1917;color:#fff;font-size:11px;padding:8px 12px;border-radius:8px;pointer-events:none;display:none;z-index:999;line-height:1.8;font-family:\'Noto Sans KR\',sans-serif;min-width:140px';
    document.body.appendChild(ttip);
  }
  tbl.addEventListener('mouseover',e=>{
    const td=e.target.closest('.dtcell');
    if(!td||isDragging) return;
    const v=+td.dataset.v||0;
    const prod=td.dataset.prod;
    if(prod==='__subtotal__'){
      /* 소계: 각 제품의 해당일 합 */
      const di=+td.dataset.di;
      const lines=selP.map(p=>{
        const pv=(slice(PROD_DAILY_ALL[p]||[])[di])||0;
        return pv>0?`<span style="color:#93c5fd">${p.length>18?p.slice(0,18)+'…':p}</span>: ${pv}개`:'';
      }).filter(Boolean);
      ttip.innerHTML=`<b style="color:#fff">3/${rangeFrom+di}일 소계: ${v}개</b><br>${lines.join('<br>')||'0개'}`;
    } else {
      /* 일반 제품: 채널별 비율 추정 */
      const di=+td.dataset.di;
      const total31=(PROD_DAILY_ALL[prod]||[]).reduce((a,b)=>a+b,0)||1;
      const malls=Object.keys(CROSS_DATA).filter(m=>CROSS_DATA[m]?.[prod]>0);
      const lines=malls.map(m=>{
        const mallTotal=CROSS_DATA[m][prod]||0;
        const est=total31>0?Math.round(v*mallTotal/total31):0;
        return est>0?`<span style="color:#93c5fd">${m}</span>: 약 ${est}개`:'';
      }).filter(Boolean);
      ttip.innerHTML=`<b style="color:#fff">3/${rangeFrom+di}일 · ${prod.length>16?prod.slice(0,16)+'…':prod}: ${v}개</b><br>${lines.length?lines.join('<br>'):'데이터 없음'}`;
    }
    ttip.style.display='block';
  });
  tbl.addEventListener('mousemove',e=>{
    ttip.style.left=(e.clientX+14)+'px';
    ttip.style.top=(e.clientY-10)+'px';
  });
  tbl.addEventListener('mouseout',e=>{
    if(!e.target.closest('.dtcell')) ttip.style.display='none';
  });
}
renderPlist(''); renderSelChips();

    Object.keys(MALL_MAP_ALL).forEach(mall=>{
      const s=document.createElement('span');

      s.textContent=mall;
      s.onclick=()=>{const i=selM.indexOf(mall);if(i>=0)selM.splice(i,1);else selM.push(mall);s.classList.toggle('selected',selM.includes(mall));renderMallChart();};
      el.appendChild(s);
    });
    mallsInited=true;
  }
  renderMallChart();

function renderMallChart(){
  const area=document.getElementById('mall-chart-area');
  const clrs=['#2563eb','#16a34a','#c2410c','#9333ea'];
  if(selM.length===0){area.innerHTML='<div class="empty">채널을 선택하세요</div>';return;}
  const ratio=(rangeTo-rangeFrom+1)/31;
  const allP=new Set();
  selM.forEach(m=>Object.keys(MALL_MAP_ALL[m]||{}).forEach(p=>allP.add(p)));
  const prods=[...allP].sort((a,b)=>
    selM.reduce((s,m)=>s+Math.round((MALL_MAP_ALL[m]?.[b]||0)*ratio),0)
    -selM.reduce((s,m)=>s+Math.round((MALL_MAP_ALL[m]?.[a]||0)*ratio),0)
  ).slice(0,15);
  const allmax=Math.max(...prods.map(p=>selM.reduce((s,m)=>s+Math.round((MALL_MAP_ALL[m]?.[p]||0)*ratio),0)),1);
  area.innerHTML='<div class="card-title">선택 채널 제품별 판매량 (상위 15개)</div>';
  prods.forEach(p=>{
    let off=0;
    const tot=selM.reduce((s,m)=>s+Math.round((MALL_MAP_ALL[m]?.[p]||0)*ratio),0);
    area.innerHTML+=`<div class="bar-row"><div class="bar-name" title="${p}">${p}</div><div class="bar-track" style="position:relative">`+
      selM.map((m,i)=>{const v=Math.round((MALL_MAP_ALL[m]?.[p]||0)*ratio);const w=Math.round(v/allmax*100);const r=`<div style="position:absolute;left:${off}%;width:${w}%;height:100%;background:${clrs[i%4]}"></div>`;off+=w;return r;}).join('')+
      `</div><div class="bar-val">${tot}</div></div>`;
  });
  area.insertAdjacentHTML('beforeend','<div class="legend" style="margin-top:14px">'+selM.map((m,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${clrs[i%4]}"></span>${m}</span>`).join('')+'</div>');
}

/* ── CROSS 교차분석 ── */
let cxSelP=[], cxSelM=[], cxChart=null, cxInited=false;
const GRP_KEYS=['A','B','C','D','E'];
const GRP_CLRS={A:'#2563eb',B:'#16a34a',C:'#c2410c',D:'#9333ea',E:'#ca8a04'};
let cxGroups={A:[],B:[],C:[],D:[],E:[]};

function initCross(){
  if(cxInited) return;
  cxInited=true;
  const mel=document.getElementById('cx-mall-chips');
  Object.keys(CROSS_DATA).forEach(mall=>{
    const s=document.createElement('span');
    s.className='chip';
    s.textContent=mall;
    s.onclick=()=>{
      const i=cxSelM.indexOf(mall);
      if(i>=0) cxSelM.splice(i,1); else cxSelM.push(mall);
      s.classList.toggle('selected',cxSelM.includes(mall));
      renderCross();
    };
    mel.appendChild(s);
  });
  cxRenderPlist('');
}

function cxClearGroups(){
  GRP_KEYS.forEach(k=>{ cxGroups[k]=[]; });
  cxRenderPlist(document.getElementById('cx-search').value);
  cxRenderGroupSummary();
  renderCross();
}

function cxAssignGroup(prod, key){
  GRP_KEYS.forEach(k=>{ cxGroups[k]=cxGroups[k].filter(p=>p!==prod); });
  if(key) cxGroups[key].push(prod);
  cxRenderPlist(document.getElementById('cx-search').value);
  cxRenderGroupSummary();
  renderCross();
}

function cxGetGroup(prod){
  return GRP_KEYS.find(k=>cxGroups[k].includes(prod))||null;
}

function cxRenderGroupSummary(){
  const wrap=document.getElementById('cx-groups-wrap');
  const active=GRP_KEYS.filter(k=>cxGroups[k].length>0);
  if(active.length===0){ wrap.innerHTML=''; return; }
  wrap.innerHTML=active.map(k=>{
    const col=GRP_CLRS[k];
    const prods=cxGroups[k];
    return `<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="width:20px;height:20px;border-radius:5px;background:${col};color:#fff;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${k}</span>
      <div style="font-size:11px;color:var(--text2);line-height:1.7">${prods.map(p=>p.length>20?p.slice(0,20)+'…':p).join(', ')}</div>
    </div>`;
  }).join('');
}

function cxFilterP(q){ cxRenderPlist(q); }
function cxRenderPlist(q){
  const el=document.getElementById('cx-plist'); el.innerHTML='';
  const hasProds=cxSelP.length>=2;
  Object.entries(PROD_DAILY_ALL)
    .map(([n,arr])=>([n,arr.reduce((a,b)=>a+b,0)]))
    .sort((a,b)=>b[1]-a[1])
    .filter(([n])=>!q||n.includes(q))
    .forEach(([name,total])=>{
      const s=cxSelP.includes(name);
      const curGrp=cxGetGroup(name);
      const grpBtns=s&&hasProds
        ? `<span style="display:flex;gap:3px;flex-shrink:0">`+
          GRP_KEYS.map(k=>{
            const active=curGrp===k;
            const col=GRP_CLRS[k];
            return `<span onclick="event.stopPropagation();cxAssignGroup('${name.replace(/'/g,"\\'")}','${active?'':k}')"
              style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;
              background:${active?col:col+'22'};color:${active?'#fff':col};border:1px solid ${col}55">${k}</span>`;
          }).join('')+`</span>`
        : '';
      const d=document.createElement('div');
      d.className='pitem'+(s?' sel':'');
      d.innerHTML=`<span class="pname" title="${name}">${name}</span>
        <span class="ptotal" style="display:flex;align-items:center;gap:6px">
          ${grpBtns}<span style="font-family:'DM Mono',monospace">${total}</span>
        </span>`;
      d.onclick=()=>cxToggleP(name);
      el.appendChild(d);
    });
}

function cxToggleP(name){
  const i=cxSelP.indexOf(name);
  if(i>=0){
    cxSelP.splice(i,1);
    GRP_KEYS.forEach(k=>{ cxGroups[k]=cxGroups[k].filter(p=>p!==name); });
  } else {
    cxSelP.push(name);
  }
  const show=cxSelP.length>=2;
  document.getElementById('cx-group-section').style.display=show?'block':'none';
  cxRenderPlist(document.getElementById('cx-search').value);
  cxRenderChips();
  cxRenderGroupSummary();
  renderCross();
}

function cxRenderChips(){
  const el=document.getElementById('cx-prod-chips');
  el.innerHTML=cxSelP.length===0
    ?'<span style="font-size:12px;color:var(--text3)">아래 목록에서 선택하세요</span>'
    :cxSelP.map(n=>`<span class="chip selected">${n.length>14?n.slice(0,14)+'…':n}<span style="margin-left:4px;cursor:pointer;font-weight:600" onclick="event.stopPropagation();cxToggleP('${n.replace(/'/g,"\\'")}')">×</span></span>`).join('');
}

function renderCross(){
  const area=document.getElementById('cx-result');
  if(cxSelP.length===0||cxSelM.length===0){
    area.innerHTML=`<div class="empty">${cxSelP.length===0?'제품을':'채널을'} 선택하세요</div>`;
    if(cxChart){cxChart.destroy();cxChart=null;} return;
  }
  const mallClrs=['#2563eb','#16a34a','#c2410c','#9333ea','#ca8a04','#0891b2','#db2777','#ea580c','#65a30d','#0284c7','#7c3aed','#059669'];
  const allVals=cxSelP.flatMap(p=>cxSelM.map(m=>(CROSS_DATA[m]&&CROSS_DATA[m][p])||0));
  const maxV=Math.max(...allVals,1);
  const activeGrps=GRP_KEYS.filter(k=>cxGroups[k].some(p=>cxSelP.includes(p)));
  const ungrouped=cxSelP.filter(p=>!cxGetGroup(p));
  const orderedProds=[
    ...activeGrps.flatMap(k=>cxGroups[k].filter(p=>cxSelP.includes(p))),
    ...ungrouped
  ];

  /* ── 수치 테이블 ── */
  let tbl=`<div class="card" style="margin-bottom:16px"><div class="card-title">수치 상세</div>
    <div class="daily-table-wrap"><table class="dtbl">
    <thead><tr><th style="text-align:left;padding-left:12px;min-width:200px">제품명</th>`;
  cxSelM.forEach(m=>{ tbl+=`<th>${m}</th>`; });
  tbl+=`<th>합계</th></tr></thead><tbody>`;

  function prodRowTbl(p, extraStyle=''){
    const vals=cxSelM.map(m=>(CROSS_DATA[m]&&CROSS_DATA[m][p])||0);
    const total=vals.reduce((a,b)=>a+b,0);
    const maxRow=Math.max(...vals,1);
    let row=`<tr><td class="pncell" style="${extraStyle}" title="${p}">${p}</td>`;
    vals.forEach(v=>{
      const cls=v===0?'zero':v===maxRow&&v>0?'hi':'';
      row+=`<td class="${cls}" style="${extraStyle}">${v||'·'}</td>`;
    });
    return row+`<td class="total-col" style="${extraStyle}">${total}</td></tr>`;
  }
  function subtotalRowTbl(k){
    const col=GRP_CLRS[k];
    const prods=cxGroups[k].filter(p=>cxSelP.includes(p));
    const vals=cxSelM.map(m=>prods.reduce((s,p)=>s+((CROSS_DATA[m]&&CROSS_DATA[m][p])||0),0));
    const total=vals.reduce((a,b)=>a+b,0);
    let row=`<tr style="background:${col}10"><td style="padding:6px 8px 6px 12px;font-size:11px;font-weight:700;color:${col};white-space:nowrap;position:sticky;left:0;background:${col}10;border-top:1.5px solid ${col}50;border-bottom:1.5px solid ${col}50">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:${col};color:#fff;font-size:10px;font-weight:700;margin-right:6px">${k}</span>그룹 ${k} 소계
    </td>`;
    vals.forEach(v=>{ row+=`<td style="font-weight:700;font-family:'DM Mono',monospace;font-size:12px;color:${col};border-top:1.5px solid ${col}50;border-bottom:1.5px solid ${col}50">${v||'·'}</td>`; });
    return row+`<td style="font-weight:700;font-family:'DM Mono',monospace;font-size:13px;color:${col};background:${col}20;border-top:1.5px solid ${col}50;border-bottom:1.5px solid ${col}50">${total}</td></tr>`;
  }

  activeGrps.forEach(k=>{
    cxGroups[k].filter(p=>cxSelP.includes(p)).forEach(p=>{ tbl+=prodRowTbl(p); });
    tbl+=subtotalRowTbl(k);
  });
  ungrouped.forEach(p=>{ tbl+=prodRowTbl(p,'color:var(--text2)'); });
  tbl+=`</tbody></table></div></div>`;

  /* ── 바 차트 ── */
  let chart=`<div class="card"><div class="card-title">제품 × 채널 판매량 차트</div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">
    <colgroup><col style="width:260px"><col style="width:120px"><col style="width:auto"></colgroup>
    <thead><tr>
      <th style="text-align:left;padding:6px 8px;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)">제품명</th>
      <th style="text-align:left;padding:6px 8px;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)">채널</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border)"></th>
    </tr></thead><tbody>`;

  orderedProds.forEach((p,pi)=>{
    const grpKey=cxGetGroup(p);
    const prodCol=grpKey?GRP_CLRS[grpKey]:null;
    cxSelM.forEach((mall,mi)=>{
      const v=(CROSS_DATA[mall]&&CROSS_DATA[mall][p])||0;
      const pct=Math.round(v/maxV*100);
      const isFirst=mi===0;
      const isLast=mi===cxSelM.length-1;
      const isLastProd=pi===orderedProds.length-1;
      const sepNext=isLast&&!isLastProd?'border-bottom:2px solid var(--border2)':'border-bottom:1px solid var(--border)';
      const nameStyle=prodCol?`color:${prodCol};font-weight:600`:'color:var(--text);font-weight:500';
      const prodCell=isFirst
        ?`<td style="padding:6px 8px;vertical-align:middle;${sepNext};${nameStyle};font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px" rowspan="${cxSelM.length}" title="${p}">
            ${prodCol?`<span style="display:inline-block;width:8px;height:8px;border-radius:3px;background:${prodCol};margin-right:5px;vertical-align:middle"></span>`:''}${p}</td>`:'';
      chart+=`<tr>${prodCell}
        <td style="padding:5px 8px;${sepNext};color:var(--text2);font-size:11px;white-space:nowrap">
          <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${mallClrs[mi%12]};margin-right:5px;vertical-align:middle"></span>${mall}
        </td>
        <td style="padding:5px 8px;${sepNext}">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;height:18px;background:var(--surface2);border-radius:3px;position:relative">
              <div style="width:${pct}%;height:100%;background:${mallClrs[mi%12]};border-radius:3px;min-width:${v>0?2:0}px"></div>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:${v>0?'var(--text)':'var(--text3)'};min-width:28px;text-align:right">${v||'·'}</span>
          </div>
        </td></tr>`;
    });
    /* 그룹 마지막 제품 뒤 소계 행 */
    if(grpKey){
      const grpProds=cxGroups[grpKey].filter(q=>cxSelP.includes(q));
      if(p===grpProds[grpProds.length-1]){
        const col=GRP_CLRS[grpKey];
        const subs=cxSelM.map(m=>grpProds.reduce((s,q)=>s+((CROSS_DATA[m]&&CROSS_DATA[m][q])||0),0));
        const gT=subs.reduce((a,b)=>a+b,0);
        const maxSub=Math.max(...subs,1);
        chart+=`<tr style="background:${col}0d">
          <td colspan="2" style="padding:5px 8px;font-size:11px;font-weight:700;color:${col};border-bottom:2px solid ${col}50;border-top:1px solid ${col}30">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:${col};color:#fff;font-size:9px;font-weight:700;margin-right:6px">${grpKey}</span>그룹 ${grpKey} 소계
          </td>
          <td style="padding:5px 8px;border-bottom:2px solid ${col}50;border-top:1px solid ${col}30">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:18px;background:${col}25;border-radius:3px;position:relative">
                <div style="width:${Math.round(gT/maxV*100)}%;height:100%;background:${col};border-radius:3px;opacity:0.6"></div>
              </div>
              <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${col};min-width:28px;text-align:right">${gT}</span>
            </div>
          </td></tr>`;
      }
    }
  });

  chart+=`</tbody></table></div></div>`;
  area.innerHTML=tbl+chart;
  if(cxChart){cxChart.destroy();cxChart=null;}
}

/* ── TAB ── */
function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='overview') renderTrend();
  if(id==='malls') initMalls();
  if(id==='cross') initCross();
}

renderOverview();
renderTrend();
</script>
</body>
</html>
